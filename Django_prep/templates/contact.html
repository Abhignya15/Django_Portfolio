{% extends "base.html" %} 
{% block title %}Contact{% endblock title %}
 {% block body %}
<div class="content">
  {% if messages %}
    {% for message in messages %}
      <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}" role="alert">{{ message }}</div>
    {% endfor %}
  {% endif %}
  <div class="container mb-3">
    <div class="row align-items-stretch justify-content-center no-gutters">
      <div class="col-md-7">
        <div class="form h-100 contact-wrap p-5">
          <h3 class="text-center">Let's Talk</h3>
          <form class="mb-5" method="post" id="contactForm" name="contactForm" action="/contact">
          {% csrf_token %}
            <div class="row">
              <div class="col-md-6 form-group mb-3">
                <label for="" class="col-form-label">Name *</label>
                <input
                  type="text"
                  class="form-control"
                  name="name"
                  id="name"
                  placeholder="Enter your name"
                  value="{{ form_data.name|default:'' }}"
                  required
                />
              </div>
              <div class="col-md-6 form-group mb-3">
                <label for="" class="col-form-label">Email *</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  id="email"
                  placeholder="Enter your email"
                  value="{{ form_data.email|default:'' }}"
                  required
                />
              </div>
            </div>

            <div class="row">
              <div class="col-md-12 form-group mb-3">
                <label for="budget" class="col-form-label">Subject</label>
                <input
                  type="text"
                  class="form-control"
                  name="subject"
                  id="subject"
                  placeholder="Your subject"
                  value="{{ form_data.subject|default:'' }}"
                />
              </div>
            </div>

            <div class="row mb-5">
              <div class="col-md-12 form-group mb-3">
                <label for="message" class="col-form-label">Message *</label>
                <textarea
                  class="form-control"
                  name="desc"
                  id="desc"
                  cols="30"
                  rows="4"
                  placeholder="Write your message"
                  required
                >{{ form_data.desc|default:'' }}</textarea>
              </div>
            </div>
            <!-- {% comment %} <div class="row justify-content-center">
              <div class="col-md-5 form-group text-center">
                <input
                  type="submit"
                  value="Send Message"
                  class="btn btn-block btn-primary rounded-0 py-2 px-4"
                />
                <span class="submitting"></span>
              </div>
            </div> {% endcomment %} -->
            <div class="row justify-content-center">
            <button class="btn btn-block btn-primary rounded-0 py-2 px-4" type="submit">
                <div class="row justify-content-center"> Submit </div>
            </button>   
            
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock body %}
